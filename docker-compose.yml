services:
  grpc-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: server
    env_file:
      - .env
    environment:
      GRPC_PORT: 50051
    restart: unless-stopped
    ports:
      - "50051:50051"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    env_file:
      - .env
    environment:
      GRPC_ADDR: grpc-server:50051
      HTTP_PORT: 8080
    depends_on:
      - grpc-server
    restart: unless-stopped
    ports:
      - "8080:8080"
